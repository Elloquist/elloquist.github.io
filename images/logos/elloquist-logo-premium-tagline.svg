<?xml version="1.0" encoding="UTF-8"?>
<!--
  Elloquist — Premium Logo with Tagline
  Variation: Premium (deep-forest background)
  Background: transparent — host element provides background
  Font: Cormorant Garamond Light 300 (must be loaded by the host page)
  Colors: Pale Gold #F0C84A throughout (two-gold rule: pale gold on dark only)
-->
<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="Elloquist — Where Eloquence Meets Curiosity">
  <title>Elloquist</title>

  <!-- Wordmark — full pale gold in premium variation, no Q accent split -->
  <text x="400" y="78"
        text-anchor="middle"
        font-family="'Cormorant Garamond', serif"
        font-size="72"
        font-weight="300"
        letter-spacing="10"
        fill="#F0C84A">ELLOQUIST</text>

  <!-- Rule — spans wordmark width -->
  <rect x="115" y="102" width="570" height="1.5" fill="#F0C84A"/>

  <!-- Tagline -->
  <text x="400" y="145"
        text-anchor="middle"
        font-family="'Cormorant Garamond', serif"
        font-size="15"
        font-weight="300"
        letter-spacing="3.5"
        fill="#F0C84A"
        opacity="0.85">WHERE ELOQUENCE MEETS CURIOSITY</text>
</svg>
